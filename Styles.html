<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap"
            rel="stylesheet"
        />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap"
rel="stylesheet">
        <title>Style Gallery</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Montserrat", sans-serif;
            }

            body {
                background: black;
                color: white;
            }
            .main-header {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 60px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 15px;
                background: #1f1e1b;
                color: white;
                z-index: 1000;
            }

            .signature {
                font-family: "Great Vibes", cursive;
                font-size: 16px;
                color: gold;
            }

            /* BACK BUTTON */
            .back-btn {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 8px 12px;
                border: none;
                background: white;
                border-radius: 6px 7px;
                cursor: pointer;
                transition: 0.3s;
            }

            .back-btn img {
                width: 16px;
                height: 16px;
            }

            .back-btn:hover {
                background: gold;
                transform: scale(1.05);
            }
            /* HERO */
            .hero {
                margin-top: 70px; /* pushes it below fixed header */
                padding: 20px;
                text-align: center;
                background: linear-gradient(to right, #1f1e1b, #000);
            }

            .hero h2 {
                font-size: 1.5rem;
                margin-bottom: 5px;
                color: gold;
            }

            .hero p {
                font-size: 13px;
                opacity: 0.8;
            }
            /* PRODUCTS GRID */
            .products {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 12px;
                padding: 15px;
            }

            /* PRODUCT CARD */
            .product {
                background: #111;
                border-radius: 10px;
                overflow: hidden;
                text-align: center;
                box-shadow: 0 2px 6px rgba(255, 255, 255, 0.05);
                display: flex;
                flex-direction: column;
                padding: 10px;
            }

            .product img {
                width: 100%;
                height: 180px;
                object-fit: cover;
                border-radius: 8px;
            }

            .product h3 {
                color: yellow;
                font-size: 13px;
                padding: 8px 0;
            }

            /* ORDER BUTTON (NOW ALWAYS BELOW CONTENT) */
            .product a {
                margin-top: auto;
                padding: 8px;
                background: #e2af68c7;
                color: #ffffff;
                border-radius: 10px;
                text-decoration: none;
                font-size: 13px;
                font-weight: bold;
            }
            .product a:hover {
                background: yellow;
                color: black;
                font-weight: bold;
            }

            /* RESPONSIVE */
            @media (min-width: 600px) {
                .hero h2 {
                    font-size: 2rem;
                }

                .product img {
                    height: 200px;
                }
            }

            @media (min-width: 900px) {
                .products {
                    grid-template-columns: repeat(4, 1fr);
                }

                .hero {
                    height: 50vh;
                }
            }
        </style>
    </head>
    <header class="main-header">
